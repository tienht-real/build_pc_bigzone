<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Hi-End Computer & Gaming Gear | Premium E-commerce{% endblock %}</title>
    <meta name="description" content="Chuyên cung cấp PC Gaming, Laptop và linh kiện máy tính cao cấp chính hãng.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', path='css/reset.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='css/variables.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='css/layout.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='css/components.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='css/header.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='css/home.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='css/category.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='css/product.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='css/cart.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='css/checkout.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='css/footer.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='css/chatbot.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='css/build_pc.css') }}">

    <!-- Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
    {% include 'components/header.html' %}

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    {% include 'components/footer.html' %}

    {% include 'components/chatbot.html' %}

    <script src="{{ url_for('static', path='js/main.js') }}"></script>
    <script src="{{ url_for('static', path='js/chatbot.js') }}"></script>
    <script src="{{ url_for('static', path='js/build_pc.js') }}"></script>
</body>
</html>
